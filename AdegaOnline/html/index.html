<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime Distribuidora</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon" />
  </head>
  <body>
    <div class="login">
      <div class="container">
        <img class="login-img" src="/img/logo.png" alt="" />
      </div>
      <h1>Login</h1>
      <form id="login-form">
        <label for="login-nome" class="label-texto">Digite seu nome:</label>
        <input type="text" placeholder="Nome" id="login-nome" required />
        <button type="submit" id="login-botao">Entrar</button>
      </form>
    </div>
    <script src="../js/script.js"></script>
  </body>
</html>
